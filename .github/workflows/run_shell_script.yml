name: Run Shell Script

on: push

jobs:
    job_shell_script:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v7

            - name: List repo files
              run: ls -ltra

            - name: Execute shell script
              run: |
                chmod -x ascii-script.sh
                ../shell_scripts/ascii-script.sh